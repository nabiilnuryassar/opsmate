# OpsMate AI — production reverse proxy.
# Serves the built SPA and routes API requests to the Laravel php-fpm backend
# over FastCGI. nginx does not share a filesystem with the backend, so every
# dynamic request is funneled through Laravel's front controller (index.php),
# whose path is resolved on the php-fpm side as /var/www/public/index.php.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 12M;

    # --- Laravel API (FastCGI → php-fpm) ---
    location ~ ^/(api/|sanctum/|up$) {
        fastcgi_pass opsmate_backend:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/public;
        fastcgi_read_timeout 30s;
        include fastcgi_params;
    }

    # --- SPA static assets + history-mode fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}


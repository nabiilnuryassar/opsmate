# Dev nginx — proxies API requests to php-fpm backend via FastCGI.
# Only handles /api, /sanctum, /up. Frontend runs separately on Vite dev server.
server {
    listen 8000;
    server_name _;

    root /var/www/public;
    index index.php;

    client_max_body_size 12M;

    # All requests go through Laravel's front controller.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 120s;
        include fastcgi_params;
    }
}

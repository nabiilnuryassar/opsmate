services:
  postgres:
    image: postgres:16-alpine
    container_name: opsmate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opsmate
      POSTGRES_USER: opsmate
      POSTGRES_PASSWORD: opsmate
    volumes:
      - opsmate-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsmate -d opsmate"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: opsmate-redis
    restart: unless-stopped
    volumes:
      - opsmate-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: opsmate-backend
    container_name: opsmate-backend
    restart: unless-stopped
    working_dir: /var/www
    # php-fpm listens on port 9000 (internal). nginx proxies to it.
    command: ["php-fpm", "-F"]
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      MAIL_HOST: host.docker.internal
      MAIL_PORT: "1025"
    volumes:
      - ./backend:/var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: opsmate-nginx
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./docker/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www:ro
    depends_on:
      - backend

  queue:
    image: opsmate-backend
    container_name: opsmate-queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --tries=3 --timeout=90
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      MAIL_HOST: host.docker.internal
      MAIL_PORT: "1025"
    volumes:
      - ./backend:/var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    container_name: opsmate-frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_PROXY_TARGET: http://nginx:8000
      VITE_HMR_CLIENT_PORT: "5174"
      VITE_POLL: "1"
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - opsmate-frontend-node-modules:/app/node_modules
    depends_on:
      nginx:
        condition: service_started

volumes:
  opsmate-pgdata:
  opsmate-redisdata:
  opsmate-frontend-node-modules:
